name: CI

on:
  pull_request:
  push:
    branches: [master, main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint (no warnings allowed)
        run: npm run lint -- --max-warnings 0

  build:
    name: Build (${{ matrix.os }} / node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        node: [18, 20]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Dev build (tsc)
        run: npm run build:dev

      - name: Production build (obfuscated)
        run: npm run build

      - name: Smoke test build output
        shell: bash
        run: |
          node -e "const m = require('./dist'); const need = ['create','extract','aggregate','toAttachment','LOCALES','resolveLanguages']; const missing = need.filter(k => !(k in m)); if (missing.length) { throw new Error('missing exports: ' + missing.join(', ')); } console.log('exports OK:', Object.keys(m).sort().join(', '));"
          test -f dist/index.d.ts
          test -f dist/index.js

  package:
    name: Package contents check
    runs-on: ubuntu-latest
    needs: [lint, build]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify tarball contents
        run: |
          npm pack --dry-run --json > pack.json
          node -e "
            const p = require('./pack.json')[0];
            const files = p.files.map(f => f.path);
            const required = ['package.json', 'README.md', 'dist/index.js', 'dist/index.d.ts'];
            const leaked   = ['src/', 'scripts/', 'tests/', 'tsconfig.json', 'eslint.config.mjs'];
            for (const r of required) {
              if (!files.includes(r)) throw new Error('missing from tarball: ' + r);
            }
            for (const prefix of leaked) {
              const hit = files.find(f => f === prefix || f.startsWith(prefix));
              if (hit) throw new Error('should not be in tarball: ' + hit);
            }
            console.log('tarball size:', (p.size/1024).toFixed(1), 'KB');
            console.log('files:', files.length);
          "
