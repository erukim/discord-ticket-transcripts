name: 🐛 Bug Report
description: 패키지 동작 오류나 예상과 다른 결과를 신고합니다.
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        버그 신고 전에 [기존 이슈](https://github.com/erukim/discord-ticket-transcripts/issues?q=is%3Aissue)를 먼저 검색해주세요.

  - type: textarea
    id: summary
    attributes:
      label: 요약
      description: 무엇이 잘못됐는지 한두 문장으로.
      placeholder: 예) Components V2의 MediaGallery가 HTML에 렌더링되지 않습니다.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: 재현 방법
      description: 최소 재현 코드 또는 단계.
      value: |
        ```ts
        import { TicketTranscript } from 'discord-ticket-transcript'

        const file = await TicketTranscript.create(channel, {
          // ...
        })
        ```

        1. ...
        2. ...
        3. ...
      render: markdown
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 기대 동작
      placeholder: 이렇게 동작해야 합니다...
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 실제 동작
      description: 에러 메시지, 스택 트레이스, 잘못 생성된 HTML 일부 등.
      render: shell
    validations:
      required: true

  - type: input
    id: package-version
    attributes:
      label: 패키지 버전
      placeholder: "예: 0.1.0"
    validations:
      required: true

  - type: input
    id: discordjs-version
    attributes:
      label: discord.js 버전
      placeholder: "예: 14.25.1"
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js 버전
      placeholder: "예: 20.11.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: 운영체제
      options:
        - Linux
        - macOS
        - Windows
        - Docker/Container
        - 기타
    validations:
      required: true

  - type: checkboxes
    id: checks
    attributes:
      label: 체크리스트
      options:
        - label: 기존 이슈를 검색해봤습니다.
          required: true
        - label: 최신 버전에서도 재현됩니다.
          required: true
        - label: 봇에 필요한 인텐트(`MessageContent`, `GuildMembers`, `GuildMessageReactions`)를 켰습니다.
          required: false
